<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech Museum</title>
    <link rel="stylesheet" href="../style.css" />

    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"
    ></script>
  </head>
  <body>
    <header>
      <h1>IBM Port-a-Punch & Punch Cards (1958)</h1>
      <p>Explore the model below — you can rotate, zoom, and interact!</p>
      <a href="../index.html">⌂ Return home </a>
    </header>

    <main>
      <p>Used for manually punching cards to enter data into a computer.</p>
      <p>
        Other items pictured promotional leaflets, punch cards, and a black info
        card.
      </p>
      <model-viewer
        src="../models/ibm_port_a_punch.glb"
        alt="IBM Port-a-Punch"
        auto-rotate
        camera-controls
        shadow-intensity="1"
        style="width: 100%; height: 600px"
      >
      </model-viewer>
    </main>

    <footer>
      <p>
        Image credits:
        <a
          href="https://en.wikipedia.org/wiki/File:IBM_Port-A-Punch.jpg"
          target="_blank"
          >Wikipedia</a
        >
      </p>
    </footer>
  </body>
</html>
