<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech Museum</title>
    <link rel="stylesheet" href="style.css" />

    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"
    ></script>
  </head>

  <body>
    <header>
      <h1 id="display-title">Loading...</h1>
      <p class="subtitle">
        Explore the model below — you can rotate, zoom, and interact!
      </p>
      <div class="nav-container">
        <a href="index.html" class="back-button">
          <span class="arrow">←</span> Return Home
        </a>
      </div>
    </header>

    <main>
      <p id="display-description"></p>
      <model-viewer
        id="display-model"
        auto-rotate
        camera-controls
        shadow-intensity="1"
        style="width: 100%; height: 600px"
      >
      </model-viewer>
    </main>

    <script type="module">
      import { museumObjects } from "./data.js";

      const urlParams = new URLSearchParams(window.location.search);
      const currentId = urlParams.get("id");
      const itemData = museumObjects.find((item) => item.id === currentId);

      if (itemData) {
        document.getElementById("display-title").textContent = itemData.title;
        document.getElementById("display-description").textContent =
          itemData.description;

        const viewer = document.getElementById("display-model");
        const errorBox = document.getElementById("error-message");

        viewer.src = itemData.model;

        viewer.orientation = itemData.rotation || "0deg 0deg 0deg"; //Fix models with incorrect orientation

        viewer.addEventListener("error", () => {
          viewer.style.display = "none";
        });

        // Credits footer information
        const creditAnchor = document.getElementById("display-imageCredit");
        creditAnchor.textContent = itemData.imageCredit;
        creditAnchor.href = itemData.imageLink;
      } else {
        document.getElementById("display-title").textContent =
          "Object Not Found";
      }
    </script>
    <footer>
      <div class="credits-section">
        Image credits:
        <a
          id="display-imageCredit"
          href="display-imageLink"
          target="_blank"
        ></a>
      </div>

      <div class="contact-section">
        <a href="mailto:pvcc.steamclub@gmail.com" target="_blank">
          Contact Us - pvcc.steamclub@gmail.com
        </a>
      </div>
    </footer>
  </body>
</html>
